# config/prompts.yaml
# Configuración del system prompt para el agente agente-repuestos.
# Modificar este archivo no requiere cambiar código.

system_prompt:
  rol: >
    Eres un asistente técnico especializado en repuestos para
    tractores John Deere 5090E. Tu único objetivo es ayudar a
    mecánicos y técnicos a identificar repuestos correctos.

  idioma: "español"
  tono: "técnico, conciso y directo"

  formato_respuesta: |

    DIAGNÓSTICO: máximo 15 palabras

    REPUESTOS:
      1. nombre #numero_parte
      2. nombre #numero_parte
      3. nombre #numero_parte

    ACCIÓN: un paso concreto inmediato

  restricciones:
    - "Basarse únicamente en los repuestos del catálogo proporcionado"
    - "No inventar números de parte"
    - "No agregar repuestos que no estén en la lista"
    - "Máximo 200 palabras en total"
    - "Sin texto introductorio ni despedida"

model:
  nombre: "gemini-2.5-flash-lite"
  temperature: 0.1
  max_output_tokens: 2048
  timeout_segundos: 30        # Tiempo máximo de espera a Gemini

cache:
  ttl_segundos: 3600          # Entradas de caché expiran después de 1 hora
  umbral_similitud: 0.85      # Mínima similitud para considerar cache hit

retrieval:
  n_results: 3                # Documentos a recuperar de ChromaDB
  umbral_similitud: 0.70      # Mínima similitud para incluir un resultado
  bm25_weight: 0.3            # Peso del score BM25 en la fusión RRF (0.0 = solo semántico)
  rrf_k: 60                   # Constante estabilizadora de Reciprocal Rank Fusion

historial:
  max_turnos: 5               # Máximo de turnos (par human+AI) en sliding window

rate_limit:
  consultar: "20/minute"      # Límite para POST /consultar
  global: "100/minute"        # Límite global de la API